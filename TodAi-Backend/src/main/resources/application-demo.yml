# 로컬 시연용 프로파일 — PostgreSQL/Docker 없이 H2 인메모리로 실행한다.
# 실행: ./gradlew bootRun --args='--spring.profiles.active=demo'
spring:
  datasource:
    url: jdbc:h2:mem:todai;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true   # http://localhost:8080/h2-console

  jpa:
    defer-datasource-initialization: true   # 엔티티 DDL 생성 후 data-h2.sql 시드 실행
    hibernate:
      ddl-auto: create
    show-sql: false

  sql:
    init:
      mode: always
      platform: h2     # data-h2.sql 만 로드 (schema-postgresql.sql 회피)
